spring.application.name=accelerate-api

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/nahq_accelerate_dev
spring.datasource.username=richardkoloski
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
# Hibernate auto-detects PostgreSQL dialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator
management.endpoints.web.exposure.include=health,info

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging — log every request/response
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG
logging.level.com.nahq.accelerate.security=DEBUG
logging.level.org.springframework.security=DEBUG

# AI / Claude API
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=claude-sonnet-4-20250514

# Auth (sandbox mode — production would use Entra ID OAuth2)
app.admin-api-key=${ADMIN_API_KEY:nahq-sandbox-2026}

# Server
server.port=4003
